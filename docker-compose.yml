services:
  postgres:
    image: postgres:16
    container_name: pygen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pygen_db
      POSTGRES_USER: pygen_user
      POSTGRES_PASSWORD: pygen_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pygen_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
